<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محرك القيمة العادلة | Fair Value Engine</title>
<meta name="description" content="نظام تقييم متعدد النماذج: DCF، الدخل المتبقي، المضاعفات، سيناريوهات، طبقة فنية وتنبؤ بثلاثة آفاق — للسوق السعودي والأمريكي">
<style>
:root{
  --bg:#0B1220; --surface:#121B2E; --surface2:#0E1626; --border:#1F2B45; --border2:#2A3A5E;
  --text:#E8EDF7; --muted:#8FA0BF; --faint:#5A6A8A;
  --gold:#D8A93D; --gold-mark:#B98328; --gold-dim:#8a6d2a;
  --green:#2EBD85; --green-mark:#27A876; --red:#F0616D; --red-mark:#E14953;
  --blue:#5B8DEF; --purple:#9B7BE8;
  --font:"Segoe UI",Tahoma,system-ui,sans-serif; --mono:"Cascadia Mono","Consolas",monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:15px;line-height:1.65}
.container{max-width:1180px;margin:0 auto;padding:0 20px 70px}
.num{font-family:var(--mono);direction:ltr;unicode-bidi:isolate}
.hidden{display:none!important}
a{color:var(--blue)}

/* Header */
header{border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0E1830 0%,var(--bg) 100%);padding:24px 0 20px;margin-bottom:20px}
.header-inner{max-width:1180px;margin:0 auto;padding:0 20px;display:flex;flex-wrap:wrap;gap:18px;align-items:flex-end;justify-content:space-between}
.brand h1{font-size:25px;font-weight:700}
.brand h1 b{color:var(--gold)}
.brand p{color:var(--muted);font-size:12.5px;margin-top:4px}
.run-panel{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
input,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-family:var(--font);font-size:14px;outline:none}
input:focus,select:focus{border-color:var(--gold)}
input.sym{width:290px;font-weight:600}
.combo{position:relative}
.sug{position:absolute;top:calc(100% + 6px);right:0;width:380px;max-width:88vw;max-height:340px;overflow-y:auto;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.45)}
.sug-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;border-bottom:1px solid rgba(31,43,69,.5);font-size:13px}
.sug-item:last-child{border-bottom:none}
.sug-item:hover,.sug-item.active{background:rgba(216,169,61,.10)}
.sug-code{font-family:var(--mono);font-weight:600;color:var(--gold);min-width:52px;direction:ltr;text-align:left}
.sug-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sug-sec{font-size:11px;color:var(--faint);white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}
.sug-badge{font-size:10.5px;padding:1px 8px;border-radius:5px;white-space:nowrap}
.b-tasi{background:rgba(46,189,133,.13);color:var(--green)}
.b-nomu{background:rgba(155,123,232,.14);color:var(--purple)}
.b-us{background:rgba(91,141,239,.14);color:var(--blue)}
button{cursor:pointer;border:none;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:600;transition:background .15s,color .15s,border-color .15s}
.btn-run{background:var(--gold);color:#1a1408;padding:10px 28px}
.btn-run:hover{background:#e9bc52}
.btn-run:disabled{background:var(--gold-dim);cursor:wait}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);padding:9px 16px}
.btn-ghost:hover{color:var(--text);border-color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:8px;max-width:1180px;margin:14px auto 0;padding:0 20px}
.chip{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 14px;font-size:12.5px;cursor:pointer}
.chip:hover{color:var(--gold);border-color:var(--gold-dim)}
.chip b{font-family:var(--mono);color:var(--text);font-weight:600;margin-inline-start:5px}
.chip:hover b{color:var(--gold)}
.pagenav{max-width:1180px;margin:16px auto 0;padding:0 20px;display:flex;gap:8px;flex-wrap:wrap}
.pagenav a{text-decoration:none;font-size:13.5px;font-weight:600;padding:9px 20px;border-radius:10px 10px 0 0;border:1px solid var(--border);border-bottom:none;color:var(--muted);background:var(--surface2);cursor:pointer}
.pagenav a.active{color:var(--gold);background:var(--surface);border-color:var(--gold-dim)}
.pagenav a:hover{color:var(--text)}
.pagenav a.active:hover{color:var(--gold)}

/* Pipeline strip */
.pipeline{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.pstep{flex:1;min-width:140px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--faint);display:flex;align-items:center;gap:8px;transition:border-color .3s,color .3s}
.pstep .pn{font-family:var(--mono);font-size:11px;border:1px solid var(--faint);border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.pstep.active{color:var(--gold);border-color:var(--gold-dim)}
.pstep.active .pn{border-color:var(--gold);color:var(--gold)}
.pstep.done{color:var(--green);border-color:rgba(46,189,133,.35)}
.pstep.done .pn{border-color:var(--green);color:var(--green)}

/* Sections */
section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:11px}
.sec-head h2{font-size:17px;font-weight:700}
.sec-head h2 .n{color:var(--gold);font-family:var(--mono);font-size:13px;margin-inline-end:7px;margin-inline-start:7px}
.sec-head .sub{font-size:12px;color:var(--muted)}

/* Status / errors */
#status{border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:18px;background:var(--surface2);font-size:13.5px;color:var(--muted)}
#status.err{border-color:rgba(240,97,109,.5);color:var(--red)}
.datalog{font-size:12.5px;color:var(--muted);line-height:2}
.datalog .ok{color:var(--green)}
.datalog .warn{color:var(--gold)}

/* Stock card */
.stock-card{display:flex;flex-wrap:wrap;gap:26px;align-items:center}
.stock-id .name{font-size:20px;font-weight:700}
.stock-id .meta{color:var(--muted);font-size:12.5px;margin-top:2px}
.price-big{font-family:var(--mono);font-size:34px;font-weight:600;direction:ltr}
.price-big small{font-size:14px;color:var(--muted);font-family:var(--font)}
.chg{font-family:var(--mono);font-size:13.5px;padding:3px 10px;border-radius:6px;direction:ltr;unicode-bidi:isolate}
.chg.up{color:var(--green);background:rgba(46,189,133,.1)}
.chg.down{color:var(--red);background:rgba(240,97,109,.1)}
.mini-stats{display:flex;gap:24px;flex-wrap:wrap;margin-right:auto}
.ms{text-align:center}
.ms .v{font-family:var(--mono);font-size:15px;font-weight:600;direction:ltr}
.ms .k{font-size:11px;color:var(--muted);margin-top:2px}

/* Verdict */
.verdict-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px}
.vcell{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:center}
.vcell .k{font-size:12px;color:var(--muted)}
.vcell .v{font-family:var(--mono);font-size:27px;font-weight:600;margin-top:4px;direction:ltr}
.vcell.gold .v{color:var(--gold)}
.vcell.green .v{color:var(--green)}
.vcell.red .v{color:var(--red)}
.tagline{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.tag{font-size:15px;font-weight:700;padding:8px 20px;border-radius:10px}
.tag-buy{background:rgba(46,189,133,.15);color:var(--green);border:1px solid rgba(46,189,133,.4)}
.tag-sell{background:rgba(240,97,109,.15);color:var(--red);border:1px solid rgba(240,97,109,.4)}
.tag-hold{background:rgba(216,169,61,.12);color:var(--gold);border:1px solid rgba(216,169,61,.4)}
.warn{background:rgba(216,169,61,.08);border:1px solid rgba(216,169,61,.35);border-radius:8px;padding:8px 13px;margin-top:9px;font-size:13px;color:#e8cd8a}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{color:var(--muted);font-weight:500;font-size:12px;text-align:start;padding:8px 10px;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid rgba(31,43,69,.55)}
td.num,th.num{text-align:end}
tr.group td{color:var(--gold);font-weight:600;font-size:12.5px;background:rgba(216,169,61,.05);border-bottom:1px solid var(--border)}
tr.total td{background:rgba(216,169,61,.1);font-weight:700;color:var(--gold);border-top:2px solid var(--gold-dim)}
.w-badge{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* Football field */
.ff{position:relative;padding-top:42px;padding-bottom:70px}
.ffgh{font-size:11.5px;font-weight:700;padding:3px 12px;margin:10px 0 2px;border-radius:6px;display:inline-block}
.ffgh.g0{background:rgba(91,141,239,.13);color:var(--blue)}
.ffgh.g1{background:rgba(155,123,232,.13);color:var(--purple)}
.ffrow{display:flex;align-items:center;margin:7px 0;position:relative;z-index:2}
.fflabel{width:225px;font-size:12.5px;flex-shrink:0;padding-inline-end:10px}
.fflabel .w-badge{margin:0 7px;opacity:.8}
.ffkeys{display:none;gap:8px;flex-wrap:wrap;margin-top:12px;font-size:12px}
.ffkeys span{padding:3px 11px;border-radius:6px;border:1px solid;background:var(--surface2);font-family:var(--font)}
.ffkeys b{font-family:var(--mono);direction:ltr;unicode-bidi:isolate}
@media(max-width:680px){
  .fflabel{width:112px;font-size:10.5px;line-height:1.4}
  .fflabel .w-badge{display:block;margin:0}
  .ffmarks{inset-inline-start:112px;bottom:34px}
  .ffv{font-size:9.5px}
  .ff{padding-top:8px;padding-bottom:14px}
  .ffmark{top:0!important;bottom:0!important}
  .ffmark span{display:none}
  .ffkeys{display:flex}
}
.fftrack{position:relative;flex:1;height:24px;direction:ltr;background:rgba(13,21,38,.5);border-radius:5px}
.ffbarR{position:absolute;top:3px;height:18px;border-radius:4px}
.ffbarR.g0{background:rgba(91,141,239,.5);border:1px solid rgba(91,141,239,.95)}
.ffbarR.g1{background:rgba(155,123,232,.45);border:1px solid rgba(155,123,232,.95)}
.ffbase{position:absolute;top:1px;height:22px;width:2.5px;background:var(--text);border-radius:2px;z-index:2}
.ffv{position:absolute;top:5px;font-size:10.5px;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.ffaxisrow{margin-top:12px}
.ffaxis{position:relative;flex:1;height:22px;direction:ltr;border-top:1.5px solid var(--border2)}
.ffaxis span{position:absolute;top:5px;transform:translateX(-50%);font-size:10px;color:var(--faint);font-family:var(--mono)}
.ffgrid{position:absolute;top:0;bottom:0;width:1px;background:rgba(31,43,69,.55)}
.ffmarks{position:absolute;top:0;bottom:68px;inset-inline-start:225px;inset-inline-end:0;direction:ltr;z-index:3}
.ffmark{position:absolute;top:0;bottom:0;border-left:2px dashed;z-index:3}
.ffmark span{position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);font-size:11px;white-space:nowrap;background:var(--surface);padding:2px 9px;border-radius:5px;border:1px solid var(--border2);z-index:6}
.ffmark.mprice{border-color:var(--red-mark);color:var(--red);top:-10px}
.ffmark.mprice span{bottom:auto;top:-30px;font-weight:700;border-color:rgba(225,73,83,.6)}
.ffmark.mfv{border-color:var(--gold-mark);color:var(--gold);bottom:-4px}
.ffmark.mbuy{border-color:var(--green-mark);color:var(--green);bottom:-4px}
.ffmark.mbuy span{bottom:-52px}
.ffstats{font-size:12.5px;color:var(--muted);margin-top:26px}

/* Grids */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:880px){.grid-2{grid-template-columns:1fr}}

/* Sensitivity */
.sens{direction:ltr}
.sens th,.sens td{text-align:center;font-family:var(--mono);font-size:12.5px;padding:7px}
.sens td.base{outline:2px solid var(--gold);border-radius:3px}

/* Technical + chart */
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:10px}
.legend i{display:inline-block;width:16px;height:3px;border-radius:2px;vertical-align:middle;margin-inline-end:6px}
canvas{width:100%;display:block}
.chart-wrap{position:relative}
#tooltip{position:absolute;pointer-events:none;background:#0d1526;border:1px solid var(--border2);border-radius:8px;padding:7px 11px;font-size:12px;font-family:var(--mono);direction:ltr;white-space:nowrap;z-index:10;display:none;color:var(--text)}

/* Forecast cards */
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.fcard{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px}
.fcard .fhead{font-weight:600;font-size:14px}
.fcard .fh{color:var(--muted);font-size:11.5px;font-weight:400}
.fcard .ftarget{font-family:var(--mono);font-size:26px;font-weight:600;margin:6px 0 2px;direction:ltr}
.fcard .frange,.fcard .fdriver{font-size:12px;color:var(--muted);margin-top:3px}
.dirchip{display:inline-block;font-size:12px;font-weight:700;padding:2px 10px;border-radius:6px;margin-top:6px}
.dir-up{color:var(--green);background:rgba(46,189,133,.12)}
.dir-down{color:var(--red);background:rgba(240,97,109,.12)}
.dir-flat{color:var(--gold);background:rgba(216,169,61,.12)}

/* Assumptions */
details.assume{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 22px;margin-bottom:18px}
details.assume summary{cursor:pointer;font-weight:700;font-size:15px;color:var(--gold);list-style:none}
details.assume summary::before{content:"◂ "}
details.assume[open] summary::before{content:"▾ "}
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:16px}
.agrid .field input,.agrid .field select{width:100%;font-family:var(--mono);font-size:13px;direction:ltr}
.agrid .field select{font-family:var(--font);direction:rtl}
.ahead{grid-column:1/-1;color:var(--muted);font-size:12px;font-weight:600;border-bottom:1px solid var(--border);padding-bottom:4px;margin-top:6px}
.abtns{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.abtns .note{font-size:12px;color:var(--faint)}

/* Recommendation */
.rec-box{margin-top:16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
.rec-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.rec-badge{font-size:19px;font-weight:800;padding:8px 26px;border-radius:10px}
.rec-title{font-size:13px;color:var(--muted)}
.rec-box ul{margin:4px 18px 0 0;padding:0}
.rec-box li{font-size:13.5px;color:var(--text);margin:6px 0;line-height:1.8}
.rec-box li::marker{color:var(--gold)}
.lock-overlay{position:absolute;inset:0;background:rgba(11,18,32,.72);backdrop-filter:blur(7px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:5;text-align:center;padding:16px}
.lock-overlay .lk{font-size:26px}
.lock-overlay p{font-size:13.5px;color:var(--muted);max-width:420px}
.skel{height:12px;border-radius:6px;background:linear-gradient(90deg,#1a2540,#22304f,#1a2540);margin:10px 0}

/* Subscription modal */
.modal-back{position:fixed;inset:0;background:rgba(4,8,16,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:26px;max-width:480px;width:100%;max-height:92vh;overflow-y:auto}
.modal h3{font-size:19px;margin-bottom:4px}
.modal h3 b{color:var(--gold)}
.modal .mprice{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--gold);margin:10px 0 2px;direction:ltr;text-align:start}
.modal .mprice small{font-size:14px;color:var(--muted);font-family:var(--font)}
.modal ul.feats{margin:10px 18px 14px 0;padding:0;font-size:13.5px}
.modal ul.feats li{margin:5px 0}
.modal ul.feats li::marker{color:var(--green)}
.modal ol.steps{margin:8px 18px 14px 0;padding:0;font-size:13px;color:var(--muted)}
.modal ol.steps li{margin:7px 0;line-height:1.8}
.modal .mrow{display:flex;gap:8px;margin-top:8px}
.modal input{flex:1;font-family:var(--mono);direction:ltr;text-transform:uppercase;font-size:13px}
.modal .msg{font-size:13px;margin-top:10px;min-height:20px}
.modal .msg.ok{color:var(--green)}
.modal .msg.err{color:var(--red)}
.modal .mclose{margin-top:14px;width:100%}
.subchip{background:rgba(46,189,133,.12);color:var(--green);border:1px solid rgba(46,189,133,.35);border-radius:8px;padding:9px 14px;font-size:12.5px;font-weight:600}
.btn-gold-line{background:transparent;color:var(--gold);border:1px solid var(--gold-dim);padding:9px 16px}
.btn-gold-line:hover{background:rgba(216,169,61,.1)}

.foot{font-size:12px;color:var(--faint);border-top:1px solid var(--border);padding-top:14px;margin-top:10px;line-height:2}
.foot b{color:var(--muted)}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <h1 data-i18n-html="brand">محرك <b>القيمة العادلة</b></h1>
      <p data-i18n="tagline"></p>
    </div>
    <div class="run-panel">
      <div class="field combo">
        <label data-i18n="searchLabel"></label>
        <input id="sym" class="sym" data-i18n-ph="searchPh" autocomplete="off">
        <div class="sug hidden" id="sug"></div>
      </div>
      <button class="btn-run" id="btnRun" onclick="run()" data-i18n="analyze"></button>
      <button class="btn-ghost" onclick="runDemo()" data-i18n="demo"></button>
      <button class="btn-gold-line" id="btnSub" onclick="openSub()">★</button>
      <button class="btn-ghost" id="btnLang" onclick="setLang(LANG==='ar'?'en':'ar')">EN</button>
    </div>
  </div>
  <div class="chips" id="chips"></div>
  <div class="pagenav">
    <a class="active" data-i18n="navFin"></a>
    <a id="navTech" href="technical.html" data-i18n="navTech"></a>
    <a href="top20.html" data-i18n="navTop"></a>
  </div>
</header>

<div class="container">

  <div class="pipeline" id="pipeline">
    <div class="pstep" data-s="1"><span class="pn">1</span><span data-i18n="steps.0"></span></div>
    <div class="pstep" data-s="2"><span class="pn">2</span><span data-i18n="steps.1"></span></div>
    <div class="pstep" data-s="3"><span class="pn">3</span><span data-i18n="steps.2"></span></div>
    <div class="pstep" data-s="4"><span class="pn">4</span><span data-i18n="steps.3"></span></div>
    <div class="pstep" data-s="5"><span class="pn">5</span><span data-i18n="steps.4"></span></div>
    <div class="pstep" data-s="6"><span class="pn">6</span><span data-i18n="steps.5"></span></div>
  </div>

  <div id="status"></div>

  <div id="results" class="hidden">

    <section id="sec-card">
      <div class="stock-card">
        <div class="stock-id">
          <div class="name" id="coName">—</div>
          <div class="meta" id="coMeta">—</div>
        </div>
        <div>
          <div class="price-big"><span id="coPrice">—</span> <small id="coCur"></small></div>
          <span class="chg" id="coChg"></span>
        </div>
        <div class="mini-stats" id="miniStats"></div>
      </div>
    </section>

    <section id="sec-verdict">
      <div class="sec-head"><h2><span data-i18n="secVerdict"></span><span class="n" data-i18n="nVerdict"></span></h2>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <div class="sub" id="verdictSub"></div>
          <button class="btn-gold-line" onclick="downloadPdf()" data-i18n="pdfBtn"></button>
        </div>
      </div>

let S=STR[LANG];

/* =====================================================================
   المرحلة 2 — معدلات الخصم (متوسط طريقتين) + WACC
===================================================================== */
function discountRates(c){
  const m = MARKETS[c.market||"SA"];
  const rf = (c.risk_free ?? m.risk_free) - m.sds;          // معدل نظيف من فرق التخلف
  const beta = c.beta ?? 1.0;
  const reCapm = rf + beta*MATURE_ERP + m.crp + (c.size_premium||0);
  const reBond = c.cost_of_debt ? c.cost_of_debt + BOND_PLUS : null;
  const res = [reCapm].concat(reBond?[reBond]:[]);
  const re = res.reduce((a,b)=>a+b,0)/res.length;
  const tax = c.tax_rate ?? m.tax;
  const E = c.market_cap || c.price*c.shares;
  const D = c.total_debt||0, V=E+D;
  const wacc = V>0 ? (E/V)*re + (D/V)*(c.cost_of_debt||reCapm*0.6)*(1-tax) : re;
  return {rf_clean:rf, beta, re_capm:reCapm, re_bond:reBond, ke:re, wacc, tax, g_cap:m.g_cap};
}

/* =====================================================================
   أدوات مشتركة
===================================================================== */
const fade=(g0,g1,n)=> n===1?[g0]:Array.from({length:n},(_,i)=>g0+(g1-g0)*i/(n-1));
const project=(b,gs)=>{let v=b;return gs.map(g=>(v*=1+g));};
const pv=(fl,r)=>fl.reduce((s,f,t)=>s+f/Math.pow(1+r,t+1),0);
const bridge=(ev,c)=>ev-(c.total_debt||0)+(c.cash||0)-(c.minority_interest||0)+(c.investments||0);

/* =====================================================================
   المرحلة 3أ — النماذج الجوهرية (كل نموذج يعيد null إن لم ينطبق)
===================================================================== */
function mDcfFcff(c,r,gs=0,mm=1,rs=0){
  let f=c.fcff; if(f==null||f<=0)return null; f*=mm;
  const wacc=r.wacc+rs, n=c.forecast_years||5;
  const g1=(c.growth_stage1??0.05)+gs;
  const gt=Math.min((c.growth_terminal??0.025)+gs*0.5, r.g_cap, wacc-0.005);
  const flows=project(f,fade(g1,gt,n));
  const tvG=flows[flows.length-1]*(1+gt)/(wacc-gt);
  let ebN=null,tvE=null;
  if(c.ebitda&&c.exit_multiple){ ebN=c.ebitda*mm; for(const g of fade(g1,gt,n))ebN*=1+g; tvE=ebN*c.exit_multiple; }
  const tv=tvE?(tvG+tvE)/2:tvG;
  const ev=pv(flows,wacc)+tv/Math.pow(1+wacc,n);
  const vps=bridge(ev,c)/c.shares;
  return {v:vps, d:{ev, tvG, tvE, tvShare:ev>0?(tv/Math.pow(1+wacc,n))/ev:null, impliedExit:ebN?tvG/ebN:null, wacc, gt}};
}
function mDcfFcfe(c,r,gs=0,mm=1,rs=0){
  let f=c.fcfe; if(f==null||f<=0)return null; f*=mm;
  const ke=r.ke+rs, n=c.forecast_years||5;
  const g1=(c.growth_stage1??0.05)+gs;
  const gt=Math.min((c.growth_terminal??0.025)+gs*0.5, r.g_cap, ke-0.005);
  const flows=project(f,fade(g1,gt,n));
  const tv=flows[flows.length-1]*(1+gt)/(ke-gt);
  return {v:(pv(flows,ke)+tv/Math.pow(1+ke,n))/c.shares, d:{ke,gt}};
}
function mDdm(c,r,gs=0,mm=1,rs=0){
  let d=c.dps; if(!d||d<=0)return null; d*=mm;
  const ke=r.ke+rs, n=c.forecast_years||5;
  const g1=(c.dividend_growth_stage1??c.growth_stage1??0.04)+gs;
  const gt=Math.min(c.growth_terminal??0.025, r.g_cap, ke-0.005);
  const divs=project(d,fade(g1,gt,n));
  const tv=divs[divs.length-1]*(1+gt)/(ke-gt);
  return {v:pv(divs,ke)+tv/Math.pow(1+ke,n), d:{ke,gt}};
}
function mRim(c,r,gs=0,mm=1,rs=0){
  const b0=c.bvps; let e=c.eps;
  if(!b0||b0<=0||e==null)return null; e*=mm;
  const ke=r.ke+rs, n=c.forecast_years||5;
  const g1=(c.growth_stage1??0.05)+gs;
  let payout=c.payout_ratio ?? (e>0?(c.dps||0)/e:0);
  payout=Math.min(Math.max(payout,0),1);
  const omega=c.ri_persistence??0.60;
  let b=b0, pvRi=0, ri=0, ei=e;
  const path=fade(g1,Math.min(g1,r.g_cap),n);
  for(let t=1;t<=n;t++){
    ri=ei-ke*b;
    pvRi+=ri/Math.pow(1+ke,t);
    b=b+ei*(1-payout);
    ei*=1+path[t-1];
  }
  const cv=(ri*omega/(1+ke-omega))/Math.pow(1+ke,n);
  return {v:b0+pvRi+cv, d:{ke,omega,payout}};
}
function mEpv(c,r,gs=0,mm=1,rs=0){
  let eb=c.ebit_normalized??c.ebit; if(eb==null||eb<=0)return null; eb*=mm;
  const wacc=r.wacc+rs;
  const ev=eb*(1-r.tax)/wacc;
  return {v:bridge(ev,c)/c.shares, d:{wacc}};
}
function mGraham(c,r,gs=0,mm=1,rs=0){
  const e=c.eps,b=c.bvps;
  if(!e||!b||e<=0||b<=0)return null;
  return {v:Math.sqrt(22.5*e*mm*b), d:{}};
}

/* =====================================================================
   المرحلة 3ب — النماذج النسبية
===================================================================== */
function mPePeer(c,r,gs=0,mm=1,rs=0){
  let e=c.eps_forward??c.eps; if(!e||e<=0)return null; e*=mm;
  const ke=r.ke+rs;
  const g=Math.min(c.growth_terminal??0.025, r.g_cap, ke-0.005);
  const payout=Math.min(Math.max(c.payout_ratio??0.5,0.05),1);
  const just=payout*(1+g)/(ke-g);
  const pes=[just].concat(c.peer_pe?[c.peer_pe]:[]);
  return {v:e*pes.reduce((a,b)=>a+b,0)/pes.length, d:{just, peer:c.peer_pe}};
}
function mEvEbitda(c,r,gs=0,mm=1,rs=0){
  if(!c.ebitda||!c.peer_ev_ebitda)return null;
  return {v:bridge(c.ebitda*mm*c.peer_ev_ebitda,c)/c.shares, d:{mult:c.peer_ev_ebitda}};
}
function mEvSales(c,r,gs=0,mm=1,rs=0){
  if(!c.revenue||!c.peer_ev_sales)return null;
  return {v:bridge(c.revenue*c.peer_ev_sales,c)/c.shares, d:{mult:c.peer_ev_sales}};
}
function mPbJust(c,r,gs=0,mm=1,rs=0){
  const b=c.bvps, roe=c.roe;
  if(!b||b<=0||roe==null)return null;
  const ke=r.ke+rs;
  const g=Math.min(c.growth_terminal??0.025, r.g_cap, ke-0.005);
  const roeA=roe*mm;
  if(roeA<=g)return null;
  const pbStar=(roeA-g)/(ke-g);
  const pbs=[pbStar].concat(c.peer_pb?[c.peer_pb]:[]);
  return {v:b*pbs.reduce((a,x)=>a+x,0)/pbs.length, d:{just:pbStar, roe:roeA}};
}
const MODELS = {dcf_fcff:mDcfFcff, dcf_fcfe:mDcfFcfe, ddm:mDdm, rim:mRim, epv:mEpv, graham:mGraham,
                pe_peer:mPePeer, ev_ebitda:mEvEbitda, ev_sales:mEvSales, pb_just:mPbJust};

function runAll(c,r,gs=0,mm=1,rs=0){
  const out={};
  for(const k in MODELS){
    let res=null;
    try{res=MODELS[k](c,r,gs,mm,rs);}catch(e){res=null;}
    if(res&&isFinite(res.v)&&res.v>0)out[k]=res;
  }
  return out;
}

/* DCF عكسي — النمو الذي يسعّره السوق ضمنياً */
function reverseDcf(c,r){
  if(c.fcff==null||c.fcff<=0)return null;
  const price=c.price;
  const valAt=g=>{const cc=Object.assign({},c,{growth_stage1:g});const x=mDcfFcff(cc,r);return x?x.v:null;};
  let lo=-0.30,hi=0.60;
  const vLo=valAt(lo),vHi=valAt(hi);
  if(vLo==null||vHi==null||!(vLo<=price&&price<=vHi))return null;
  for(let i=0;i<60;i++){const mid=(lo+hi)/2;const v=valAt(mid);if(v==null)return null;if(v<price)lo=mid;else hi=mid;}
  return (lo+hi)/2;
}

/* =====================================================================
   المرحلة 4 — الدمج: مرجح + مشذّب + وسيط، سيناريوهات، حساسية
===================================================================== */
function ensemble(mv,arch){
  const vals={}; for(const k in mv)vals[k]=mv[k].v;
  const keys=Object.keys(vals);
  if(!keys.length)return null;
  const w=WEIGHTS[arch]||WEIGHTS.mature;
  const avail={}; for(const k of keys)if((w[k]||0)>0)avail[k]=w[k];
  let weighted;
  const aKeys=Object.keys(avail);
  if(aKeys.length){const tot=aKeys.reduce((s,k)=>s+avail[k],0);weighted=aKeys.reduce((s,k)=>s+vals[k]*avail[k]/tot,0);}
  else weighted=keys.reduce((s,k)=>s+vals[k],0)/keys.length;
  const sorted=keys.map(k=>vals[k]).sort((a,b)=>a-b);
  const mean=a=>a.reduce((x,y)=>x+y,0)/a.length;
  const trimmed=sorted.length>=4?mean(sorted.slice(1,-1)):mean(sorted);
  const med=sorted.length%2?sorted[(sorted.length-1)/2]:(sorted[sorted.length/2-1]+sorted[sorted.length/2])/2;
  const fv=(weighted+trimmed+med)/3;
  return {weighted, trimmed, median:med, fair_value:fv, min:sorted[0], max:sorted[sorted.length-1],
          dispersion:med>0?(sorted[sorted.length-1]-sorted[0])/med:null, n:sorted.length, weights:avail};
}
function sensitivity(c,r){
  if(!mDcfFcff(c,r))return null;
  const shifts=[-0.01,-0.005,0,0.005,0.01];
  const rows=shifts.map(dw=>shifts.map(dg=>{
    const cc=Object.assign({},c,{growth_terminal:(c.growth_terminal??0.025)+dg});
    const x=mDcfFcff(cc,r,0,1,dw);
    return x?x.v:null;
  }));
  return {shifts, rows, baseWacc:r.wacc, baseG:c.growth_terminal??0.025};
}

/* =====================================================================
   المرحلة 5 — الطبقة الفنية
===================================================================== */
const sma=(p,n)=>p.length<n?null:p.slice(-n).reduce((a,b)=>a+b,0)/n;
function smaSeries(p,n){const out=new Array(p.length).fill(null);let s=0;for(let i=0;i<p.length;i++){s+=p[i];if(i>=n)s-=p[i-n];if(i>=n-1)out[i]=s/n;}return out;}
function emaSeries(p,n){if(p.length<n)return null;const k=2/(n+1);let e=p.slice(0,n).reduce((a,b)=>a+b,0)/n;const out=[e];for(let i=n;i<p.length;i++){e=p[i]*k+e*(1-k);out.push(e);}return out;}
function rsiW(p,n=14){
  if(p.length<n+1)return null;
  let g=0,l=0;
  for(let i=1;i<=n;i++){const d=p[i]-p[i-1];g+=Math.max(d,0);l+=Math.max(-d,0);}
  let ag=g/n,al=l/n;
  for(let i=n+1;i<p.length;i++){const d=p[i]-p[i-1];ag=(ag*(n-1)+Math.max(d,0))/n;al=(al*(n-1)+Math.max(-d,0))/n;}
  if(al===0)return 100;
  return 100-100/(1+ag/al);
}
function macdHist(p,f=12,s=26,sig=9){
  if(p.length<s+sig)return null;
  const ef=emaSeries(p,f),es=emaSeries(p,s);
  const line=es.map((v,i)=>ef[ef.length-es.length+i]-v);
  if(line.length<sig)return null;
  const sl=emaSeries(line,sig);
  return line[line.length-1]-sl[sl.length-1];
}
const mom121=p=>p.length<252?null:p[p.length-21]/p[p.length-252]-1;
function annVol(p,lb=252){
  const px=p.slice(-Math.min(lb,p.length));
  if(px.length<30)return null;
  const rets=[];for(let i=1;i<px.length;i++)rets.push(Math.log(px[i]/px[i-1]));
  const mu=rets.reduce((a,b)=>a+b,0)/rets.length;
  const va=rets.reduce((s,x)=>s+(x-mu)*(x-mu),0)/(rets.length-1);
  return Math.sqrt(va)*Math.sqrt(252);
}
function techSnapshot(p){
  if(!p||p.length<60)return null;
  const price=p[p.length-1], s50=sma(p,50), s200=sma(p,200);
  const r=rsiW(p), hist=macdHist(p), mom=mom121(p), vol=annVol(p);
  const parts=[],ws=[];
  if(s50&&s200){parts.push(price>s50&&s50>s200?1:(price<s50&&s50<s200?-1:(price>s200?0.4:-0.4)));ws.push(0.30);}
  if(hist!=null&&price>0){parts.push(Math.max(Math.min(hist/(price*0.01),1),-1));ws.push(0.20);}
  if(r!=null){parts.push(Math.max(Math.min((50-r)/20,1),-1));ws.push(0.20);}
  if(mom!=null){parts.push(Math.max(Math.min(mom/0.30,1),-1));ws.push(0.30);}
  const score=ws.length?parts.reduce((s,x,i)=>s+x*ws[i],0)/ws.reduce((a,b)=>a+b,0):0;
  return {price,s50,s200,golden:!!(s50&&s200&&s50>s200),rsi:r,macd:hist,mom,vol,score};
}

/* =====================================================================
   المرحلة 6 — التنبؤ بثلاثة آفاق (نقطة + نطاق)
===================================================================== */
function forecasts(price,fv,c,tech){
  const vol=(tech&&tech.vol)||0.25, score=(tech&&tech.score)||0, mom=(tech&&tech.mom)||0;
  const dy=price>0?(c.dps||0)/price:0;
  const gE=c.growth_stage1??0.05;
  const gap=price>0?fv/price-1:0;
  const band=(t,y)=>{const s=vol*Math.sqrt(y);return [t*(1-s),t*(1+s)];};
  const dir=er=>er>0.03?"up":(er<-0.03?"down":"flat");
  const erS=score*vol*Math.sqrt(0.25)*0.5;
  const tS=price*(1+erS);
  let erM=0.40*gap+dy+0.15*Math.max(Math.min(mom,0.5),-0.5);
  erM=Math.max(Math.min(erM,0.60),-0.45);
  const tM=price*(1+erM);
  const rev=price>0?Math.pow(Math.max(fv,0.01)/price,1/5)-1:0;
  const erL=gE*0.7+dy+rev*0.8;
  const tL=price*Math.pow(1+erL,5);
  const [loS,hiS]=band(tS,0.25),[loM,hiM]=band(tM,1),[loL,hiL]=band(tL,2);
  return {
    short:{er:erS, t:tS, lo:loS, hi:hiS, dir:dir(erS), drv:"s", annual:false},
    medium:{er:erM, t:tM, lo:loM, hi:hiM, dir:dir(erM), drv:"m", annual:false},
    long:{er:erL, t:tL, lo:loL, hi:hiL, dir:dir(erL), drv:"l", annual:true},
  };
}

/* =====================================================================
   التوصية — شراء / احتفاظ / بيع مع الأسباب الكمية
===================================================================== */
function recommendation(c,pkg){
  const up=pkg.upside, mos=pkg.mos, disp=pkg.ens.dispersion, ts=pkg.tech?pkg.tech.score:null;
  let cls;
  if(up>mos)cls="buy";
  else if(up<-0.10)cls="sell";
  else cls="hold";
  let note=null;
  if(cls==="buy"&&disp!=null&&disp>0.60){
    cls="hold";
    note=S.recNote(Math.round(disp*100));
  }
  const reasons=[];
  reasons.push(S.r1(fmt(pkg.fair_value),fmt(c.price),fmtPct(up),Math.round(mos*100),fmt(pkg.buyBelow)));
  if(disp!=null)reasons.push(disp>0.25?S.r2hi(Math.round(disp*100)):S.r2lo(Math.round(disp*100)));
  if(ts!=null){
    const state=ts>=0.15?S.techSupport:ts<=-0.15?S.techDrag:S.techNeutral;
    reasons.push(S.r3(state,(ts>=0?"+":"")+ts.toFixed(2),pkg.tech.golden));
  }
  reasons.push(S.r4(fmt(pkg.fc.medium.t),fmtPct(pkg.fc.medium.er),S.dirs[pkg.fc.medium.dir],fmtPct(pkg.fc.long.er)));
  if(pkg.impliedG!=null){
    const a=c.growth_stage1??0.05;
    reasons.push(S.r5((pkg.impliedG*100).toFixed(1),(a*100).toFixed(1),pkg.impliedG>a));
  }
  if(c.macro_stretched!==false)reasons.push(S.r6);
  return {rec:S.rec[cls],cls,reasons,note};
}

/* =====================================================================
   المحرك — evaluate(c) → حزمة تقييم كاملة
===================================================================== */
function evaluate(c){
  const price=c.price, arch=c.archetype||"mature";
  const rates=discountRates(c);
  const mv=runAll(c,rates);
  const impliedG=reverseDcf(c,rates);
  const ens=ensemble(mv,arch);
  if(!ens)throw new Error(S.errNoModel);
  const scen={};
  for(const k in SCENARIOS){
    const s=SCENARIOS[k];
    const e=ensemble(runAll(c,rates,s.gs,s.mm,s.rs),arch);
    scen[k]={fv:e?e.fair_value:null, prob:s.prob, label:s.label};
  }
  const pw=Object.values(scen).filter(s=>s.fv);
  const probFv=pw.length?pw.reduce((s,x)=>s+x.fv*x.prob,0)/pw.reduce((s,x)=>s+x.prob,0):ens.fair_value;
  const fv=(ens.fair_value+probFv)/2;
  let mos=MOS[c.size||"large"]??0.25;
  const warnings=[];
  if(ens.dispersion&&ens.dispersion>DISP_WARN){mos+=DISP_ADDON;warnings.push({k:"disp",v:Math.round(ens.dispersion*100)});}
  if(c.macro_stretched!==false){mos+=MACRO_ADDON;warnings.push({k:"macro"});}
  const tvShare=mv.dcf_fcff&&mv.dcf_fcff.d.tvShare;
  if(tvShare&&tvShare>0.80)warnings.push({k:"tv",v:Math.round(tvShare*100)});
  const buyBelow=fv*(1-mos);
  const tech=techSnapshot(c.price_history);
  const fc=forecasts(price,fv,c,tech);
  const upside=fv/price-1;
  let vkey,tag;
  if(upside>mos){vkey="buy";tag="buy";}
  else if(upside>0){vkey="wait";tag="hold";}
  else if(upside>-0.10){vkey="near";tag="hold";}
  else{vkey="over";tag="sell";}
  const pkg={c, rates, models:mv, impliedG, ens, scen, probFv, fair_value:fv, upside,
          mos, buyBelow, vkey, tag, warnings, sens:sensitivity(c,rates), tech, fc};
  pkg.rec=recommendation(c,pkg);
  return pkg;
}

const LOG=[];
function dlog(src,msg,cls){LOG.push({src,msg,cls});}
async function jget(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error("HTTP "+r.status);
  return r.json();
}
function latestFund(fund,type){
  const item=(fund.timeseries&&fund.timeseries.result||[]).find(x=>x.meta&&x.meta.type&&x.meta.type[0]===type);
  if(!item||!item[type])return null;
  const arr=item[type].filter(x=>x&&x.reportedValue&&x.reportedValue.raw!=null);
  return arr.length?{v:arr[arr.length-1].reportedValue.raw, hist:arr.map(x=>x.reportedValue.raw)}:null;
}
function calcBeta(closesA,tsA,closesB,tsB){
  const mapB={};tsB.forEach((t,i)=>{if(closesB[i]!=null)mapB[new Date(t*1000).toISOString().slice(0,10)]=closesB[i];});
  const pa=[],pb=[];
  tsA.forEach((t,i)=>{const d=new Date(t*1000).toISOString().slice(0,10);if(closesA[i]!=null&&mapB[d]!=null){pa.push(closesA[i]);pb.push(mapB[d]);}});
  if(pa.length<120)return null;
  const ra=[],rb=[];
  for(let i=1;i<pa.length;i++){ra.push(pa[i]/pa[i-1]-1);rb.push(pb[i]/pb[i-1]-1);}
  const mean=a=>a.reduce((x,y)=>x+y,0)/a.length;
  const ma=mean(ra),mb=mean(rb);
  let cov=0,varB=0;
  for(let i=0;i<ra.length;i++){cov+=(ra[i]-ma)*(rb[i]-mb);varB+=(rb[i]-mb)*(rb[i]-mb);}
  if(varB===0)return null;
  return Math.max(0.3,Math.min(2.0,cov/varB));
}
function detectArchetype(sector,payout){
  if(!sector)return "mature";
  if(/financial/i.test(sector))return "financial";
  if(/utilit|communication/i.test(sector))return "dividend";
  if(/technolog/i.test(sector))return "growth";
  if(payout!=null&&payout>0.7)return "dividend";
  return "mature";
}

    beta=ks.beta??sd.beta??null;
    if(beta==null&&bench){const bts=bench.timestamp||[],bcl=bench.indicators.quote[0].close||[];beta=calcBeta(closesRaw,ts,bcl,bts);}
    if(beta==null){beta=1.0;dlog(S.lBeta,S.lBetaNA,"warn");}
  }

  // النمو: تقدير المحللين +5 سنوات ← نمو الأرباح ← CAGR تاريخي
  let g1=null,gSrc="";
  const et=sum&&sum.earningsTrend&&sum.earningsTrend.trend||[];
  const g5=et.find(x=>x.period==="+5y");
  if(g5&&g5.growth!=null){g1=g5.growth;gSrc=S.srcAnalyst;}
  else if(fd.earningsGrowth!=null){g1=fd.earningsGrowth;gSrc=S.srcRecent;}
  else if(ni&&ni.hist.length>=3&&ni.hist[0]>0&&ni.hist[ni.hist.length-1]>0){
    g1=Math.pow(ni.hist[ni.hist.length-1]/ni.hist[0],1/(ni.hist.length-1))-1;gSrc=S.srcCagr;
  }
  g1=Math.max(Math.min(g1??0.05,0.20),-0.05);
  dlog(S.lGrowth,S.lGrowthMsg((g1*100).toFixed(1),gSrc||S.srcDefault),"ok");

  const mcap=p.marketCap??sd.marketCap??price*shares;
  const mcapUsd=market==="SA"?mcap/3.75:mcap;
  const size=mcapUsd>10e9?"large":(mcapUsd>2e9?"mid":"small");
  const totalDebt=fd.totalDebt??(debtF?debtF.v:0);
  const cash=fd.totalCash??(cashF?cashF.v:0);
  const ebitda=fd.ebitda??(ebitdaF?ebitdaF.v:null);
  const ev=ks.enterpriseValue??(mcap+totalDebt-cash);
  const evEb=ebitda&&ev?ev/ebitda:null;
  const payout=sd.payoutRatio??ks.payoutRatio??null;
  const roe=fd.returnOnEquity??(ni&&eq&&eq.v>0?ni.v/eq.v:null);
  const bvps=ks.bookValue??(eq&&eq.v>0?eq.v/shares:null);
  const eps=ks.trailingEps??(ni&&ni.v?ni.v/shares:null);
  const costDebt=(intExp&&totalDebt>0&&intExp.v!==0)?Math.min(Math.max(Math.abs(intExp.v)/totalDebt,0.02),0.12):null;
  const arch=detectArchetype(prof.sector,payout);
  dlog(S.lClass,S.lClassMsg(prof.sector||S.unknownSector,archLabel(arch),size),"ok");

  return {
    ticker:sym, name:p.longName||meta.longName||(DIR.find(d=>d.sym===sym)||{}).name||sym, market, size, archetype:arch,
    sector:prof.sector||"", industry:prof.industry||"",
    currency:p.currency||meta.currency||m.cur,
    chgPct:p.regularMarketChangePercent!=null?p.regularMarketChangePercent*100:null,
    price:+price, shares:+shares, market_cap:+mcap, beta:+beta,
    total_debt:+totalDebt, cash:+cash, cost_of_debt:costDebt,
    eps:eps??null, eps_forward:ks.forwardEps??null, bvps:bvps??null, roe:roe??null,
    dps:dps??0, payout_ratio:payout,
    revenue:rev?rev.v:(fd.totalRevenue??null), ebitda, ebit:ebit?ebit.v:null,
    fcff, fcfe,
    growth_stage1:g1, growth_terminal:0.025, forecast_years:5,
    exit_multiple:evEb?Math.max(4,Math.min(14,+evEb.toFixed(1))):null,
    peer_pe:ks.forwardPE??sd.forwardPE??null,
    peer_ev_ebitda:evEb?+evEb.toFixed(1):null,
    peer_ev_sales:null, peer_pb:null,
    macro_stretched:true,
    price_history:closes, price_ts:cts,
    highs, lows, vols,
    bench_closes:bench?(bench.indicators.quote[0].close||[]).filter(x=>x!=null):null,
  };
}

const DIR=[];
(typeof SA_COMPANIES!=="undefined"?SA_COMPANIES:[]).forEach(c=>DIR.push({
  sym:c.s+".SR", code:c.s, name:c.n, en:c.e||"", sec:c.sec||"", badge:c.m, cls:c.m==="نمو"?"b-nomu":"b-tasi"}));

  sym:c.s, code:c.s, name:c.n||c.e, en:c.e, sec:"", badge:"أمريكا", cls:"b-us"}));
const POPULAR=["2222.SR","1120.SR","1180.SR","2010.SR","7010.SR","2280.SR","AAPL","MSFT","NVDA","GOOGL","AMZN","TSLA"];
const norm=s=>(s||"").toString().toLowerCase()
  .replace(/[أإآٱ]/g,"ا").replace(/ة/g,"ه").replace(/ى/g,"ي").replace(/[ؤئ]/g,"ء")
  .replace(/[ً-ْـ]/g,"").replace(/[.\-\s]/g,"");
function searchDir(q){
  const nq=norm(q);
  if(!nq)return POPULAR.map(s=>DIR.find(d=>d.sym===s)).filter(Boolean);
  const scored=[];
  for(const d of DIR){
    const code=d.code.toLowerCase(), name=norm(d.name), en=norm(d.en);
    let sc=0;
    if(code===nq||norm(d.sym)===nq)sc=120;
    else if(code.startsWith(nq))sc=100;
    else if(name.startsWith(nq))sc=80;
    else if(name.includes(nq))sc=60;
    else if(en.startsWith(nq))sc=50;
    else if(en.includes(nq))sc=40;
    if(sc)scored.push([sc,d]);
  }
  return scored.sort((a,b)=>b[0]-a[0]).slice(0,14).map(x=>x[1]);
}

function resolveSymbol(raw){
  const v=raw.trim();
  if(/^\d{4}$/.test(v))return v+".SR";
  if(/^\d{4}\.SR$/i.test(v))return v.toUpperCase();
  if(/^[A-Za-z][A-Za-z0-9.\-]{0,9}$/.test(v)&&DIR.some(d=>d.sym.toUpperCase()===v.toUpperCase()))return v.toUpperCase();
  const hits=searchDir(v);
  if(hits.length)return hits[0].sym;
  return /^[A-Za-z0-9.\-^=]{1,12}$/.test(v)?v.toUpperCase():null;
}
function setStage(n,state){
  document.querySelectorAll(".pstep").forEach(el=>{
    const s=+el.dataset.s;
    el.classList.toggle("done",s<n||(s===n&&state==="done"));
    el.classList.toggle("active",s===n&&state!=="done");
  });
}
function status(msg,err){const el=$("status");el.textContent=msg;el.classList.toggle("err",!!err);el.classList.remove("hidden");}

async function run(){
  hideSug();
  const sym=resolveSymbol($("sym").value);
  if(!sym){status(S.errNoCompany,true);return;}
  $("sym").value=sym;
  $("btnRun").disabled=true;
  $("results").classList.add("hidden");
  try{
    setStage(1);status(S.statusFetch(sym));
    const c=await fetchInputs(sym);
    setStage(2);status(S.statusCalc);
    await new Promise(r=>setTimeout(r,30));
    const pkg=evaluate(c);
    CUR={c,pkg};
    setStage(6,"done");
    $("status").classList.add("hidden");
    renderAll();
  }catch(e){
    status(S.errRun(e.message),true);
    setStage(0);
  }
  $("btnRun").disabled=false;
}

function runDemo(){
  // مثال توضيحي: شركة صناعية سعودية (بيانات افتراضية) + مسار سعري مولّد حتمياً
  let seed=42;const rnd=()=>{seed=(seed*1103515245+12345)%2147483648;return seed/2147483648;};
  const ph=[];let v=46;
  for(let i=0;i<505;i++){v*=1+(rnd()-0.485)*0.018;ph.push(+v.toFixed(2));}
  const scale=54/ph[ph.length-1];

  const now=Date.now()/1000;
  const c={
    ticker:"XXXX.SR", name:S.demoName, market:"SA", size:"large",

    macro_stretched:true, price_history:hist,

    highs:hist.map(x=>+(x*(1+0.006+rnd()*0.012)).toFixed(2)),
    lows:hist.map(x=>+(x*(1-0.006-rnd()*0.012)).toFixed(2)),
    vols:hist.map(()=>Math.round(8e5*(0.5+rnd()))),

let chartState=null;
function drawChart(c,pkg){
  const cv=$("priceChart"), wrap=cv.parentElement;
  const W=wrap.clientWidth||900, H=300, dpr=window.devicePixelRatio||1;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.height=H+"px";
  const ctx=cv.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
  const p=c.price_history;if(!p||p.length<10)return;
  const s50=smaSeries(p,50),s200=smaSeries(p,200);
  const fv=pkg.fair_value;
  let lo=Math.min(...p),hi=Math.max(...p);
  if(fv>lo*0.4&&fv<hi*2.2){lo=Math.min(lo,fv);hi=Math.max(hi,fv);}
  const pad=(hi-lo)*0.07;lo-=pad;hi+=pad;
  const ML=8,MR=52,MT=10,MB=22;
  const X=i=>ML+i/(p.length-1)*(W-ML-MR);
  const Y=v=>MT+(1-(v-lo)/(hi-lo))*(H-MT-MB);
  // grid + y labels
  ctx.strokeStyle="rgba(31,43,69,.6)";ctx.fillStyle="#5A6A8A";ctx.font="10.5px Consolas,monospace";ctx.lineWidth=1;
  for(let i=0;i<=3;i++){
    const v=lo+(hi-lo)*i/3, y=Y(v);
    ctx.beginPath();ctx.moveTo(ML,y);ctx.lineTo(W-MR,y);ctx.stroke();
    ctx.fillText(fmt(v,v<10?2:1),W-MR+6,y+3);
  }
  const line=(series,color,width,dash)=>{
    ctx.strokeStyle=color;ctx.lineWidth=width;ctx.setLineDash(dash||[]);
    ctx.beginPath();let started=false;
    series.forEach((v,i)=>{if(v==null)return;const x=X(i),y=Y(v);if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);});
    ctx.stroke();ctx.setLineDash([]);
  };
  // fair value dashed line
  if(fv>lo&&fv<hi){
    ctx.strokeStyle="#B98328";ctx.setLineDash([5,4]);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(ML,Y(fv));ctx.lineTo(W-MR,Y(fv));ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle="#D8A93D";ctx.fillText("FV "+fmt(fv,1),W-MR+6,Y(fv)+3);
  }
  line(s200,"#9B7BE8",1.6);
  line(s50,"#B98328",1.6);
  line(p,"#5B8DEF",2);
  // x labels (dates)
  if(c.price_ts&&c.price_ts.length===p.length){
    ctx.fillStyle="#5A6A8A";
    [0,Math.floor(p.length/2),p.length-1].forEach(i=>{
      const d=new Date(c.price_ts[i]*1000);
      const lbl=d.toISOString().slice(0,7);
      ctx.fillText(lbl,Math.min(Math.max(X(i)-18,ML),W-MR-52),H-6);
    });
  }
  chartState={p,s50,s200,X,Y,W,H,ML,MR,c};
}

function readAssumptions(){
  const c=Object.assign({},CUR.c);
  for(const f of AFIELDS){
    if(f[0]==="h")continue;
    const [key,,type]=f;
    const el=$("a_"+key);if(!el)continue;
    if(type==="select"){
      c[key]=key==="macro_stretched"?el.value==="1":el.value;
      continue;
    }
    const raw=el.value.trim();
    if(raw===""){c[key]=null;continue;}
    let v=parseFloat(raw);
    if(!isFinite(v)){c[key]=null;continue;}
    if(type==="pct")v/=100;
    else if(type==="mln")v*=1e6;
    c[key]=v;
  }
  if(c.forecast_years)c.forecast_years=Math.max(3,Math.min(15,Math.round(c.forecast_years)));
  c.market_cap=c.price*c.shares;
  return c;
}

/* رسومات التقرير — اتجاه نص صريح (يمنع انعكاس RTL)، عمود تسميات منفصل،
   القيم فوق النقاط بهالة بيضاء (paint-order) */
const HALO='paint-order="stroke" stroke="#fff" stroke-width="3.5"';
function svgOpen(W,H){return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;direction:ltr;font-family:Segoe UI,Tahoma,sans-serif">`;}
function svgLabel(x,y,txt,ar,size=10.5,fill="#3d3c35",weight=400){
  // ar=true: نص عربي يمتد يساراً من x — ar=false: يمتد يميناً
  return `<text x="${x}" y="${y}" direction="${ar?"rtl":"ltr"}" text-anchor="start" font-size="${size}" font-weight="${weight}" fill="${fill}" ${HALO}>${txt}</text>`;
}
function svgVal(x,y,txt,fill="#333",size=10,weight=700){
  return `<text x="${x}" y="${y}" direction="ltr" text-anchor="middle" font-size="${size}" font-weight="${weight}" fill="${fill}" ${HALO}>${txt}</text>`;
}
function svgFF(c,pkg){
  const AR=LANG==="ar";
  const rows=Object.entries(pkg.models).map(([k,m])=>({label:mlabel(k),v:m.v})).sort((a,b)=>b.v-a.v);
  const all=rows.map(r=>r.v).concat([c.price,pkg.fair_value,pkg.buyBelow]);
  const lo=Math.min(...all)*0.90, hi=Math.max(...all)*1.08;
  const W=680,LW=192,rowH=30,H=rows.length*rowH+78;
  const pL=AR?12:LW+14, pR=AR?W-LW-14:W-12;      // منطقة الرسم
  const X=v=>pL+((v-lo)/(hi-lo))*(pR-pL);
  const labX=AR?W-4:4;
  let s=svgOpen(W,H);
  rows.forEach((r,i)=>{
    const y=20+i*rowH;
    s+=`<line x1="${pL-4}" y1="${y}" x2="${pR+4}" y2="${y}" stroke="#e7e2d5" stroke-width="1"/>`;
    s+=svgLabel(labX,y+4,esc(r.label),AR);
    s+=`<circle cx="${X(r.v)}" cy="${y}" r="5.5" fill="#2456b8"/>`;
    s+=svgVal(X(r.v),y-9,fmt(r.v),"#2b2a25");
  });
  const yb=rows.length*rowH+16;
  const mark=(v,color,label,dy)=>{
    s+=`<line x1="${X(v)}" y1="8" x2="${X(v)}" y2="${yb}" stroke="${color}" stroke-width="1.6" stroke-dasharray="5 3"/>`;
    s+=`<text x="${X(v)}" y="${yb+dy}" direction="${AR?"rtl":"ltr"}" text-anchor="middle" font-size="10.5" font-weight="700" fill="${color}" ${HALO}>${label} ${fmt(v)}</text>`;
  };
  mark(c.price,"#a32d2d",S.mPrice,16);
  mark(pkg.fair_value,"#0e6e56",S.mFV,34);
  mark(pkg.buyBelow,"#b07a17",S.mBuy,52);
  return s+"</svg>";
}
function svgScen(pkg){
  const AR=LANG==="ar";
  const rows=["bear","base","bull"].map(k=>({...pkg.scen[k],name:S.scen[k]})).filter(r=>r.fv);
  const hi=Math.max(...rows.map(r=>r.fv))*1.18;
  const W=340,LW=96,barH=17,H=rows.length*31+12;
  const pL=AR?8:LW+10, pR=AR?W-LW-10:W-8;
  const labX=AR?W-4:4;
  let s=svgOpen(W,H);
  rows.forEach((r,i)=>{
    const y=9+i*31, w=(r.fv/hi)*(pR-pL-46);
    const x0=AR?pL:pL, col=i===0?"#a32d2d":i===1?"#b07a17":"#0e6e56";
    s+=svgLabel(labX,y+12,`${r.name} ${Math.round(r.prob*100)}%`,AR,10.5,"#3d3c35",600);
    s+=`<rect x="${x0}" y="${y}" width="${Math.max(w,3)}" height="${barH}" rx="4" fill="${col}" opacity="0.88"/>`;
    s+=`<text x="${x0+Math.max(w,3)+6}" y="${y+12}" direction="ltr" text-anchor="start" font-size="10.5" font-weight="700" fill="#333" ${HALO}>${fmt(r.fv)}</text>`;
  });
  return s+"</svg>";
}
function svgFc(c,pkg){
  const AR=LANG==="ar";
  const F=[[S.fcRows.short,pkg.fc.short],[S.fcRows.medium,pkg.fc.medium],[S.fcRows.long,pkg.fc.long]];
  const all=F.flatMap(([,f])=>[f.lo,f.hi]).concat([c.price]);
  const lo=Math.min(...all)*0.95, hi=Math.max(...all)*1.05;
  const W=680,LW=150,rowH=36,H=F.length*rowH+34;
  const pL=AR?46:LW+14, pR=AR?W-LW-14:W-46;
  const X=v=>pL+((v-lo)/(hi-lo))*(pR-pL);
  const labX=AR?W-4:4;
  let s=svgOpen(W,H);
  s+=`<line x1="${X(c.price)}" y1="8" x2="${X(c.price)}" y2="${H-24}" stroke="#a32d2d" stroke-width="1.4" stroke-dasharray="5 3"/>`;
  s+=`<text x="${X(c.price)}" y="${H-9}" direction="${AR?"rtl":"ltr"}" text-anchor="middle" font-size="10" font-weight="700" fill="#a32d2d" ${HALO}>${S.mPrice} ${fmt(c.price)}</text>`;
  F.forEach(([lbl,f],i)=>{
    const y=26+i*rowH;
    const col=f.dir==="up"?"#0e6e56":f.dir==="down"?"#a32d2d":"#b07a17";
    s+=svgLabel(labX,y+4,lbl,AR);
    s+=`<line x1="${X(f.lo)}" y1="${y}" x2="${X(f.hi)}" y2="${y}" stroke="#d5cfbf" stroke-width="5" stroke-linecap="round"/>`;
    s+=svgVal(X(f.lo),y+15,fmt(f.lo),"#8b8674",9);
    s+=svgVal(X(f.hi),y+15,fmt(f.hi),"#8b8674",9);
    s+=`<circle cx="${X(f.t)}" cy="${y}" r="6" fill="${col}" stroke="#fff" stroke-width="1.5"/>`;
    s+=svgVal(X(f.t),y-10,fmt(f.t),col,10.5);
  });
  return s+"</svg>";
}

</style></head><body>

<div class="rec nobreak"><span class="b">${S.rptRec}${r.rec}</span><span class="t">${S.rptRecSub(pkg.ens.n,pkg.ens.dispersion!=null?Math.round(pkg.ens.dispersion*100)+"%":"—")}</span></div>

<ul class="rs">${r.reasons.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>

${["short","medium","long"].map(key=>{const f=pkg.fc[key];
return `<tr><td>${S.fcRows[key]}</td><td class="n">${fmt(f.t)}</td><td class="n">${fmt(f.lo)} – ${fmt(f.hi)}</td><td class="n">${fmtPct(f.er)}${f.annual?S.perYear:""}</td><td>${S.dirs[f.dir]}</td><td style="font-size:10.5px">${S.drv[f.drv]}</td></tr>`;}).join("")}
</table></div>

${t?`<h2>${S.hTech}</h2>

<tr><td class="n">${t.score>=0?"+":""}${t.score.toFixed(2)}</td><td class="n">${fmt(t.s50)} / ${fmt(t.s200)}${t.golden?" ✓":""}</td><td class="n">${t.rsi!=null?t.rsi.toFixed(1):"—"}</td><td class="n">${t.mom!=null?fmtPct(t.mom):"—"}</td><td class="n">${t.vol!=null?(t.vol*100).toFixed(1)+"%":"—"}</td></tr></table>`:""}

}

setLang(LANG);

$("sym").addEventListener("blur",()=>setTimeout(hideSug,150));
window.addEventListener("fv:langchange",()=>{if(typeof renderTrading==="function"&&CUR)renderTrading();});
$("sym").addEventListener("keydown",e=>{
  const open=!$("sug").classList.contains("hidden");
  if(e.key==="ArrowDown"&&open){e.preventDefault();sugIdx=Math.min(sugIdx+1,sugItems.length-1);markActive();}
  else if(e.key==="ArrowUp"&&open){e.preventDefault();sugIdx=Math.max(sugIdx-1,0);markActive();}
  else if(e.key==="Escape")hideSug();
  else if(e.key==="Enter"){
    e.preventDefault();
    if(open&&sugIdx>=0)chooseSug(sugIdx);
    else run();
  }
});
